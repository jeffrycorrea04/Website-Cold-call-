<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cold Call Script</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0A0F;
    color: #E8E8F0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  header .sub { font-size: 10px; letter-spacing: 3px; color: #444; text-transform: uppercase; margin-bottom: 6px; }
  header h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  header p { font-size: 12px; color: #444; margin-top: 4px; }
  .tabs {
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 12px 16px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #444;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab.active { color: var(--c); border-bottom-color: var(--c); }
  .section { display: none; padding: 20px; }
  .section.active { display: block; }
  .section-tag { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--c); margin-bottom: 4px; font-weight: 700; }
  .section-title { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 12px; }
  .coach-box {
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 12.5px;
    line-height: 1.7;
    color: #999;
    margin-bottom: 20px;
    border: 1px solid;
  }
  .card {
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.03);
  }
  .card-you { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
  .card-text { font-size: 14px; line-height: 1.8; color: #d8d8e8; }
  .note {
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(255,107,53,0.06);
    border: 1px solid rgba(255,107,53,0.25);
    font-size: 12px;
    color: #FF6B35;
    line-height: 1.65;
    margin-bottom: 10px;
  }
  .pause-box {
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(168,85,247,0.06);
    border: 1px solid rgba(168,85,247,0.25);
    font-size: 12px;
    color: #A855F7;
    line-height: 1.65;
    margin-bottom: 10px;
  }
  .objection-block {
    border-radius: 10px;
    border: 1px solid rgba(250,204,21,0.2);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .objection-label {
    padding: 10px 14px;
    background: rgba(250,204,21,0.08);
    font-size: 11px;
    color: #FACC15;
    font-weight: 700;
  }
  .objection-response {
    padding: 12px 14px;
    background: rgba(0,0,0,0.2);
    font-size: 13.5px;
    color: #d0d0e0;
    line-height: 1.75;
  }
  .nav {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
  }
  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    border: none;
  }
  .btn-prev { background: rgba(255,255,255,0.06); color: #888; border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>
<header>
  <div class="sub">Cold Call OS // Website Sales</div>
  <h1>No-Website Cold Call Script</h1>
  <p>Qualify → Amplify Pain → Set Value → Close the Meeting</p>
</header>
<div class="tabs" id="tabs"></div>
<div id="sections"></div>
<script>
const sections = [
  {
    id:"hook",label:"⚡ Hook",tag:"0–10 Seconds",color:"#00FF94",
    title:"Pattern Interrupt Opener",
    coaching:"Most cold callers say 'How are you today?' — don't. Use a confident, slightly disarming opener that sounds nothing like a sales call. Speak calm, not rushed.",
    content:[
      {type:"line",text:"Hey [Name], this is Jeffry — real quick, I'm not gonna take up much of your time. I actually reached out because I noticed something about your business and wanted to run it by you real fast. You got like 60 seconds?"},
      {type:"note",text:"If they say yes → go to Discovery. If they say 'What's this about?' → same thing, pivot right in. Never say 'I'm calling to sell you...'"},
    ]
  },
  {
    id:"discovery",label:"🔍 Discovery",tag:"Pain Amplification",color:"#FF6B35",
    title:"Make Them Feel The Gap",
    coaching:"Each question makes them realize customers are slipping away RIGHT NOW. Ask slowly. Let the silence work after each answer.",
    content:[
      {type:"line",text:"So I was looking up [business type] in [city] and came across [Business Name]. Quick question — if someone Googled your business right now, what would they find?"},
      {type:"pause",text:"Let them answer. If they say 'nothing' or 'not much' — perfect. If they say 'we have social media' → next question."},
      {type:"line",text:"Got it. So let me ask — when a new customer is deciding between you and a competitor, where do they go to make that decision?"},
      {type:"pause",text:"They'll say Google, word of mouth, or social media. All roads lead to: they look for a website."},
      {type:"line",text:"Right. And here's what's crazy — 75% of people judge a business's credibility based on their website alone. So if there's no website, what do you think happens to those people?"},
      {type:"pause",text:"Let them answer. They know. They're losing customers. Let that land."},
      {type:"line",text:"Exactly. They just go to whoever has one. No hard feelings, they just move on. How much do you think that's cost you over the last year?"},
      {type:"note",text:"This is the money question. Most people have never thought about it this way. Sit in the silence. Don't rush."},
    ]
  },
  {
    id:"value",label:"🚀 Value",tag:"Set The Vision",color:"#A855F7",
    title:"Paint The Picture",
    coaching:"Now you're not selling a website — you're selling the business they COULD have. Make it vivid. Be specific to their industry.",
    content:[
      {type:"line",text:"Here's what we do — we build you a professional website that does three things: it shows up when people search for you in [city], it tells your story so customers trust you before they even call, and it makes it dead simple to contact you or book. That's it."},
      {type:"line",text:"Think about this — if just ONE new customer finds you online this month because of your website, does that pay for it? [pause] Most of our clients get that in week one."},
      {type:"line",text:"And honestly, the real win isn't just new customers — it's that you stop losing the ones you already earned. Someone hears about you, they look you up, and instead of finding nothing... they find something that makes them say 'okay, these people are legit.'"},
      {type:"note",text:"Pause here. Don't keep talking. Let the value breathe."},
    ]
  },
  {
    id:"objections",label:"🛡️ Objections",tag:"Handle With Confidence",color:"#FACC15",
    title:"Top Objection Rebuttals",
    coaching:"Never argue. Agree, redirect, and re-anchor to the cost of inaction. Stay calm — you're the expert.",
    content:[
      {type:"objection",objection:'"I\'m not really interested."',response:"Totally fair — honestly most people I talk to say that before they realize what they're leaving on the table. Let me ask you one thing: if a new customer searches for a [business type] in [city] tonight and you don't show up, where do you think they go?"},
      {type:"objection",objection:'"We already have Facebook/Instagram."',response:"That's a great start — and here's the thing, a website makes your social media work ten times harder. When someone sees your Facebook and wants to know if you're legit, they Google you. If there's no website, that trust gap kills the sale. We make sure that doesn't happen."},
      {type:"objection",objection:'"I don\'t have the budget right now."',response:"I hear you — most of our clients said the same thing. But think about it: if the website brings in even one client, does it pay for itself? [pause] We work with businesses of all sizes, let's just see what makes sense for you."},
      {type:"objection",objection:'"I need to think about it."',response:"100% — I respect that. Can I ask what specifically you'd want to think through? Most of the time there's one thing that's not fully clear and I'd rather just answer it now than have you sitting on it."},
      {type:"objection",objection:'"We had a website before and it didn\'t do anything."',response:"Yeah, that's super common — a bad website is almost worse than no website. Usually it wasn't built to rank on Google or make it easy to contact you. That's exactly what we fix. What did your old site look like?"},
    ]
  },
  {
    id:"close",label:"🎯 Close",tag:"Lock In The Next Step",color:"#00CFFF",
    title:"Book The Meeting",
    coaching:"Your goal on THIS call is NOT to sell the website — it's to book a follow-up. Give two specific time options. Never ask open-ended 'when works for you?'",
    content:[
      {type:"line",text:"Here's what I'd like to do — I want to put together a quick mockup of what your site could look like, totally free, no commitment. If you love it, we talk next steps. If not, you keep it and we part ways. Fair enough?"},
      {type:"line",text:"I have time Tuesday at 11 or Wednesday at 2 — which one works better for a quick 20-minute call where I walk you through it?"},
      {type:"note",text:"Shut up after this. The next person to speak loses. If they say neither → 'What day this week works for you?' Keep it moving."},
      {type:"line",text:"Perfect. I'll send you a calendar invite to [email/number]. And just so you know — I only work with a few businesses at a time in each area so I can actually make sure your site performs. I think you'll like what I put together."},
    ]
  },
];

const tabsEl=document.getElementById("tabs");
const sectionsEl=document.getElementById("sections");
let activeIdx=0;

function render(){
  tabsEl.innerHTML="";
  sectionsEl.innerHTML="";
  sections.forEach((s,i)=>{
    const tab=document.createElement("button");
    tab.className="tab"+(i===activeIdx?" active":"");
    tab.style.setProperty("--c",s.color);
    tab.textContent=s.label;
    tab.onclick=()=>{activeIdx=i;render();};
    tabsEl.appendChild(tab);

    const sec=document.createElement("div");
    sec.className="section"+(i===activeIdx?" active":"");
    sec.style.setProperty("--c",s.color);

    let html=`<div class="section-tag">${s.tag}</div>
    <div class="section-title">${s.title}</div>
    <div class="coach-box" style="background:${s.color}0D;border-color:${s.color}30">
    <strong style="color:${s.color}">COACH · </strong>${s.coaching}</div>`;

    s.content.forEach(item=>{
      if(item.type==="line"){
        html+=`<div class="card"><div class="card-you" style="color:${s.color}">YOU</div><div class="card-text">${item.text}</div></div>`;
      }else if(item.type==="note"){
        html+=`<div class="note"><strong>NOTE · </strong>${item.text}</div>`;
      }else if(item.type==="pause"){
        html+=`<div class="pause-box"><strong>⏸ PAUSE · </strong>${item.text}</div>`;
      }else if(item.type==="objection"){
        html+=`<div class="objection-block"><div class="objection-label">OBJECTION · ${item.objection}</div><div class="objection-response"><strong style="color:#00FF94;font-size:9px;letter-spacing:2px;">YOUR RESPONSE · </strong>${item.response}</div></div>`;
      }
    });

    html+=`<div class="nav">`;
    if(i>0)html+=`<button class="btn btn-prev" onclick="go(${i-1})">← Prev</button>`;
    else html+=`<div></div>`;
    if(i<sections.length-1)html+=`<button class="btn" style="background:${s.color};color:#000" onclick="go(${i+1})">Next →</button>`;
    html+=`</div>`;

    sec.innerHTML=html;
    sectionsEl.appendChild(sec);
  });
  const activeTab=tabsEl.children[activeIdx];
  if(activeTab)activeTab.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  window.scrollTo(0,0);
}

function go(idx){activeIdx=idx;render();}
render();
</script>
</body>
</html>
